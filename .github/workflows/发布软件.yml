name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install onnxruntime opencv-python pillow pywin32 PyQt5 requests

      - name: Copy VC++ runtime DLLs
        run: |
          # 复制必要的运行时 DLL 到当前目录
          Copy-Item "C:\Windows\System32\vcruntime140.dll" -Destination .\
          Copy-Item "C:\Windows\System32\vcruntime140_1.dll" -Destination .\
          Copy-Item "C:\Windows\System32\msvcp140.dll" -Destination .\
          Copy-Item "C:\Windows\System32\vcomp140.dll" -Destination .\

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --windowed --icon=logo.ico `
            --add-data "ai/best.onnx;ai" `
            --add-data "vcruntime140.dll;." `
            --add-data "vcruntime140_1.dll;." `
            --add-data "msvcp140.dll;." `
            --add-data "vcomp140.dll;." `
            --name "HKWorldfishing" HKWorldfishing.py

      - name: Compress output folder
        run: |
          Compress-Archive -Path dist/HKWorldfishing -DestinationPath HKWorldfishing.zip

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: HKWorldfishing.zip
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}