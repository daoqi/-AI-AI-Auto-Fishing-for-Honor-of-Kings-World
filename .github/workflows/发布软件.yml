name: Build and Release

on:
  push:
    tags:
      - 'v*'               # 推送 v1.0.0, v1.0.1 等标签时触发
  workflow_dispatch:       # 允许手动触发（在 Actions 页面点击按钮）

permissions:
  contents: write          # 赋予写入权限，用于创建 Release 和上传文件

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 修复 Git 安全目录问题（避免 exit code 128）
      - name: Configure Git safe directory
        run: git config --global --add safe.directory ${{ github.workspace }}

      # 3. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ultralytics opencv-python pillow pywin32 PyQt5

      # 5. 使用 PyInstaller 打包（包含模型文件）
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon=logo.ico --add-data "ai/best.pt;ai" --name "HKWorldfishing" HKWorldfishing.py

      # 6. 创建 Release 并上传 exe
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2   # 使用最新版本
        with:
          files: dist/HKWorldfishing.exe
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}